name: CI (engine)

on:
  push:
    branches: [main]
    paths:
      - 'engine/**'
      - 'platform/**'
      - 'games/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.clang-format'
      - '.clang-tidy'
      - 'format.ps1'
      - 'lint.ps1'
      - '.gitattributes'
      - '.github/workflows/ci-engine.yml'
  pull_request:
    paths:
      - 'engine/**'
      - 'platform/**'
      - 'games/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - '.clang-format'
      - '.clang-tidy'
      - 'format.ps1'
      - 'lint.ps1'
      - '.gitattributes'
      - '.github/workflows/ci-engine.yml'
  # Nightly + manual triggers for the extended-checks job (ASan, UBSan,
  # MSVC /analyze). Those checks aren't gating per-PR — see the job's
  # `if:` guard below.
  schedule:
    - cron: '0 11 * * *'  # 11:00 UTC daily (~7AM ET / 4AM PT)
  workflow_dispatch:

jobs:
  # --------------------------------------------------------------------
  # Build & test — runs three configs on every PR and every push to
  # main:
  #   debug    — primary developer config; clang-tidy uses this DB
  #   release  — catches uninit / optimizer-only issues Debug hides
  #   analyze  — MSVC /analyze static checks (binary still produced;
  #              the /analyze pass is purely additive)
  # Each matrix entry is a separate Windows runner; the Vulkan SDK
  # cache is shared across all three so only the first one over a
  # given SDK version pays the install cost.
  # --------------------------------------------------------------------
  build-and-test:
    name: Build & Test (${{ matrix.preset }})
    runs-on: windows-2022

    strategy:
      fail-fast: false
      matrix:
        preset: [debug, release, analyze]

    env:
      # Pin: matches what's vendored in engine/third_party/VENDORING.md
      # (Volk vulkan-sdk-1.4.350.0). Bump in lockstep with the vendored
      # Volk tag so the loader code and the SDK headers stay in sync.
      VULKAN_VERSION: 1.4.350.0

    steps:
      - uses: actions/checkout@v5

      # Sets INCLUDE / LIB / PATH for MSVC so Ninja can drive cl.exe.
      # Without this, find_package fails to locate the Windows SDK.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Cache the installed SDK directory keyed on version. The SDK is
      # ~1GB to download and ~5min to install — caching saves both per
      # run after the first. Cache scope is files under
      # C:\VulkanSDK\<version>\, which covers everything compile-time
      # needs (headers, libs, slangc). Registry-side state (layer
      # manifests, ICD lookup) is not needed in CI today: engine_tests
      # is pure doctest and Pong.exe doesn't create a Vulkan instance
      # yet. Revisit if CI starts running Vulkan code.
      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\${{ env.VULKAN_VERSION }}
          key: vulkan-sdk-windows-${{ env.VULKAN_VERSION }}

      # Direct LunarG installer rather than a community action — fewer
      # supply-chain hops, easier to inspect, and the silent-install
      # flags (--accept-licenses --default-answer --confirm-command
      # install) are stable across SDK versions. Only runs on cache miss.
      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # LunarG serves the Windows installer at /<version>/windows/vulkan_sdk.exe
          # (the literal filename, not VulkanSDK-<version>-Installer.exe — that path
          # 404s). Same file is also reachable at /latest/windows/vulkan_sdk.exe.
          $url = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_VERSION/windows/vulkan_sdk.exe"
          $installer = "$env:RUNNER_TEMP\vulkan-sdk-installer.exe"
          Write-Host "Downloading Vulkan SDK $env:VULKAN_VERSION from $url"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Running installer (silent)..."
          $process = Start-Process -FilePath $installer -ArgumentList '--accept-licenses', '--default-answer', '--confirm-command', 'install' -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Vulkan SDK installer exited with code $($process.ExitCode)" }

      # Always-run: export VULKAN_SDK + add SDK Bin to PATH. On a fresh
      # install the installer would set these for itself; on a cache
      # restore the installer never runs, so we set them explicitly
      # either way.
      - name: Export Vulkan env
        shell: pwsh
        run: |
          $sdkPath = "C:\VulkanSDK\$env:VULKAN_VERSION"
          "VULKAN_SDK=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$sdkPath\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          Write-Host "VULKAN_SDK=$sdkPath (cache-hit=${{ steps.cache-vulkan.outputs.cache-hit }})"

      - name: Install Ninja
        run: choco install ninja --no-progress -y
        shell: pwsh

      - name: Show tool versions
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          slangc -v
          "VULKAN_SDK = $env:VULKAN_SDK"

      - name: Configure (${{ matrix.preset }})
        run: cmake --preset ${{ matrix.preset }}
        shell: pwsh

      - name: Build (${{ matrix.preset }})
        run: cmake --build --preset ${{ matrix.preset }}
        shell: pwsh

      # ctest --output-on-failure surfaces failing doctest assertions
      # inline in the run log — mirrors the cpp/ workflow's convention.
      # The test preset sets this via `output.outputOnFailure` in
      # CMakePresets.json.
      - name: Run unit tests (${{ matrix.preset }})
        run: ctest --preset ${{ matrix.preset }}
        shell: pwsh

  # --------------------------------------------------------------------
  # Lint — clang-format + clang-tidy. Uses the `debug` preset's
  # compile_commands.json. Unchanged behavior vs. the pre-preset
  # workflow, just routed through `cmake --preset` instead of a
  # hand-rolled configure line.
  # --------------------------------------------------------------------
  lint:
    name: Lint (clang-format + clang-tidy)
    runs-on: windows-2022

    env:
      # Same SDK pin as build-and-test. clang-tidy needs the Vulkan
      # headers via compile_commands.json, so the lint job has to install
      # the SDK too. The cache shared with build-and-test makes the
      # second install effectively free after the first run.
      VULKAN_VERSION: 1.4.350.0

    steps:
      - uses: actions/checkout@v5

      # MSVC env: same reason as build-and-test — cmake's find_package
      # for the Windows SDK + cl.exe resolution. clang-tidy itself runs
      # against the LLVM toolchain, but the compile commands it consumes
      # reference cl.exe and the MSVC headers.
      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\${{ env.VULKAN_VERSION }}
          key: vulkan-sdk-windows-${{ env.VULKAN_VERSION }}

      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_VERSION/windows/vulkan_sdk.exe"
          $installer = "$env:RUNNER_TEMP\vulkan-sdk-installer.exe"
          Write-Host "Downloading Vulkan SDK $env:VULKAN_VERSION from $url"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Running installer (silent)..."
          $process = Start-Process -FilePath $installer -ArgumentList '--accept-licenses', '--default-answer', '--confirm-command', 'install' -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Vulkan SDK installer exited with code $($process.ExitCode)" }

      - name: Export Vulkan env
        shell: pwsh
        run: |
          $sdkPath = "C:\VulkanSDK\$env:VULKAN_VERSION"
          "VULKAN_SDK=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$sdkPath\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Ninja
        run: choco install ninja --no-progress -y
        shell: pwsh

      # windows-2022 ships LLVM at C:\Program Files\LLVM\bin — clang-format
      # and clang-tidy are both there. Add it to PATH so the scripts can
      # find them without a Chocolatey roundtrip.
      - name: Add LLVM to PATH
        shell: pwsh
        run: |
          $llvmBin = "C:\Program Files\LLVM\bin"
          if (-not (Test-Path $llvmBin))
          {
              choco install llvm --no-progress -y
          }
          "$llvmBin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Show tool versions
        shell: pwsh
        run: |
          clang-format --version
          clang-tidy --version
          cmake --version
          ninja --version

      # clang-format check is fast and doesn't need compile_commands.json.
      # Run it first so format violations surface before the slower
      # clang-tidy pass.
      - name: clang-format check
        run: ./format.ps1
        shell: pwsh

      # Configure with the debug preset to produce
      # build/debug/compile_commands.json. lint.ps1 falls back to
      # configuring itself if the file is missing, but doing it
      # explicitly here keeps the steps' responsibilities legible
      # in the run log.
      - name: Configure (debug preset, for compile_commands.json)
        run: cmake --preset debug
        shell: pwsh

      - name: clang-tidy
        run: ./lint.ps1
        shell: pwsh

  # --------------------------------------------------------------------
  # Extended checks — ASan + UBSan (clang-cl). Runtime sanitizers, so
  # their value scales with the amount of code exercised by the test
  # suite. Today's tests are a doctest smoke + math; once there's real
  # simulation/render code these will earn their keep more strongly.
  # Runs nightly + on manual dispatch so regressions surface within
  # ~24h. Locally: `cmake --preset asan` or `--preset ubsan`.
  # --------------------------------------------------------------------
  extended-checks:
    name: Extended checks (ASan + UBSan)
    runs-on: windows-2022
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    env:
      VULKAN_VERSION: 1.4.350.0

    steps:
      - uses: actions/checkout@v5

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v4
        with:
          path: C:\VulkanSDK\${{ env.VULKAN_VERSION }}
          key: vulkan-sdk-windows-${{ env.VULKAN_VERSION }}

      - name: Install Vulkan SDK
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/$env:VULKAN_VERSION/windows/vulkan_sdk.exe"
          $installer = "$env:RUNNER_TEMP\vulkan-sdk-installer.exe"
          Write-Host "Downloading Vulkan SDK $env:VULKAN_VERSION from $url"
          Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing
          Write-Host "Running installer (silent)..."
          $process = Start-Process -FilePath $installer -ArgumentList '--accept-licenses', '--default-answer', '--confirm-command', 'install' -Wait -PassThru
          if ($process.ExitCode -ne 0) { throw "Vulkan SDK installer exited with code $($process.ExitCode)" }

      - name: Export Vulkan env
        shell: pwsh
        run: |
          $sdkPath = "C:\VulkanSDK\$env:VULKAN_VERSION"
          "VULKAN_SDK=$sdkPath" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$sdkPath\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Ninja
        run: choco install ninja --no-progress -y
        shell: pwsh

      # clang-cl ships with VS 2022; msvc-dev-cmd@v1 puts the VS bin
      # directory on PATH, so `clang-cl` resolves without extra install.
      - name: Show tool versions
        shell: pwsh
        run: |
          cmake --version
          ninja --version
          cl /Bv 2>&1 | Select-Object -First 1
          clang-cl --version

      # --- ASan ------------------------------------------------------
      # Configure with the `asan` preset (strips /RTC1, adds
      # /fsanitize=address). msvc-dev-cmd has already added the ASan
      # runtime DLL directory to PATH, so engine_tests can launch and
      # any heap/stack overrun fires through to ctest's failure path.
      - name: Configure (asan)
        run: cmake --preset asan
        shell: pwsh

      - name: Build (asan)
        run: cmake --build --preset asan
        shell: pwsh

      - name: Run unit tests (asan)
        run: ctest --preset asan
        shell: pwsh

      # --- UBSan (clang-cl) -----------------------------------------
      - name: Configure (ubsan, clang-cl)
        run: cmake --preset ubsan
        shell: pwsh

      - name: Build (ubsan)
        run: cmake --build --preset ubsan
        shell: pwsh

      - name: Run unit tests (ubsan)
        run: ctest --preset ubsan
        shell: pwsh
