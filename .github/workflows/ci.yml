name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      # Pure-logic tests (math, keyboard) — fast, no Metal needed.
      - name: Test Engine
        working-directory: Engine
        run: swift test

      - name: Test Platform
        working-directory: Platform
        run: swift test

      # Renderer tests need the Metal compiler, which only Xcode-driven
      # builds invoke. From the Engine package directory, xcodebuild
      # resolves Package.swift and runs the SwiftPM-generated scheme
      # (which includes RendererSmokeTests).
      - name: Test Engine renderer (xcodebuild)
        working-directory: Engine
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Engine \
            -destination 'platform=macOS'

      # End-to-end: builds + runs FlappyBirdTests, exercises the full
      # Engine + Platform + game-shader bundling chain.
      - name: Build & Test FlappyBird
        working-directory: FlappyBird
        run: |
          set -o pipefail
          xcodebuild test \
            -project FlappyBird.xcodeproj \
            -scheme FlappyBird \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
