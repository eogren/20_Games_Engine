name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Test Engine
        working-directory: Engine
        run: swift test

      - name: Test Platform
        working-directory: Platform
        run: swift test

      # Engine is tested twice: `swift test` covers pure-logic tests, but
      # the SwiftPM CLI doesn't invoke the Metal compiler, so renderer
      # tests need an Xcode-driven build to compile shaders. test.sh is
      # the canonical entry point so CI and local stay in sync.
      - name: Test Engine renderer (xcodebuild)
        run: ./Engine/test.sh

      # Build-only on CI: the GHA macos-26 runner is a virtualized GPU
      # without Metal 4 support, so launching the FlappyBird app (what
      # `xcodebuild test` does to host the test bundle) trips the
      # Renderer's Metal 4 preflight and aborts. FlappyBirdTests is
      # empty today, so we lose no test coverage; revisit if real
      # FlappyBird-side tests appear AND CI moves to real hardware.
      - name: Build FlappyBird
        working-directory: FlappyBird
        run: |
          set -o pipefail
          xcodebuild build \
            -project FlappyBird.xcodeproj \
            -scheme FlappyBird \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      # Cross-compile gate for the iOS branches in Platform / Engine.
      # Targets generic iOS device (not Simulator): the iOS Simulator
      # SDK does not ship MTL4 types, so the renderer can't compile
      # against it. Real-device SDK does, and that's the deployment
      # target anyway. Build-only — no run.
      - name: Build Platform for iOS
        run: ./Platform/build-ios.sh

      # Build-only iOS gate for FlappyBird itself. Same reasoning as
      # above (real-device SDK, not Simulator). Catches game-side
      # regressions in App.swift / .metal compilation before they
      # reach a device.
      - name: Build FlappyBird for iOS
        working-directory: FlappyBird
        run: |
          set -o pipefail
          xcodebuild build \
            -project FlappyBird.xcodeproj \
            -scheme FlappyBird \
            -configuration Debug \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
