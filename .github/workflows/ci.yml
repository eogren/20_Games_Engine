name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-26

    steps:
      - uses: actions/checkout@v5

      - name: Show toolchain versions
        run: |
          sw_vers
          xcodebuild -version
          swift --version

      - name: Test Engine
        working-directory: Engine
        run: swift test

      - name: Test Platform
        working-directory: Platform
        run: swift test

      # Engine is tested twice: `swift test` covers pure-logic tests, but
      # the SwiftPM CLI doesn't invoke the Metal compiler, so renderer
      # tests need an Xcode-driven build to compile shaders.
      - name: Test Engine renderer (xcodebuild)
        working-directory: Engine
        run: |
          set -o pipefail
          xcodebuild test \
            -scheme Engine \
            -destination 'platform=macOS'

      - name: Build & Test FlappyBird
        working-directory: FlappyBird
        run: |
          set -o pipefail
          xcodebuild test \
            -project FlappyBird.xcodeproj \
            -scheme FlappyBird \
            -configuration Debug \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""
